name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recruiter
          POSTGRES_PASSWORD: recruiter
          POSTGRES_DB: recruiter_copilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recruiter -d recruiter_copilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://recruiter:recruiter@localhost:5432/recruiter_copilot_test?schema=public
      TEST_DATABASE_URL: postgresql://recruiter:recruiter@localhost:5432/recruiter_copilot_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Prisma generate + migrate
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - run: pnpm run ci
