name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-migrate-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recruiter
          POSTGRES_PASSWORD: recruiter
          POSTGRES_DB: recruiter_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recruiter -d recruiter_copilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://recruiter:recruiter@localhost:5432/recruiter_copilot?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec prisma generate
      - run: pnpm exec prisma migrate deploy
      - run: pnpm exec prisma db seed
      - name: Build Docker image
        run: docker build -t recruiter-copilot:ci .

  # Windows production host (Docker Desktop + Cloudflare Tunnel).
  # Requires secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY
  # Host must be reachable on TCP 22 from GitHub (port-forward / CF TCP / VPN).
  # See docs/GITHUB_ACTIONS_SSH_DEPLOY.md
  deploy-ssh:
    needs: build-and-migrate-smoke
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      secrets.DEPLOY_HOST != '' &&
      secrets.DEPLOY_SSH_KEY != ''
    steps:
      - name: Deploy over SSH (Windows PowerShell)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          # Windows OpenSSH DefaultShell should be powershell.exe (install script sets this).
          script_stop: true
          command_timeout: 25m
          script: |
            $ErrorActionPreference = 'Stop'
            $deployPath = '${{ secrets.DEPLOY_PATH }}'
            if (-not (Test-Path $deployPath)) { throw "DEPLOY_PATH missing: $deployPath" }
            Set-Location $deployPath
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            if (-not (Test-Path .env.production)) { throw "Missing .env.production" }
            docker compose --env-file .env.production up -d --build
            $ok = $false
            for ($i = 1; $i -le 36; $i++) {
              Start-Sleep -Seconds 5
              try {
                $body = (Invoke-WebRequest -Uri 'http://127.0.0.1:3000/health' -UseBasicParsing -TimeoutSec 5).Content
                if ($body -match '"persistence"\s*:\s*"postgres"' -and $body -match '"status"\s*:\s*"ok"') {
                  Write-Host "Health OK"
                  Write-Host $body
                  $ok = $true
                  break
                }
              } catch {}
            }
            if (-not $ok) {
              docker compose --env-file .env.production logs --tail 120 api
              throw "Health check failed"
            }
