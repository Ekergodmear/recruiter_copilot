# Production compose — PostgreSQL persistence + API (+ optional nginx/SSL).
#
# Core:
#   docker compose --env-file .env.production up -d --build
#
# With reverse proxy (HTTP):
#   docker compose --env-file .env.production --profile proxy up -d --build
#
# With TLS (Let's Encrypt) after DOMAIN + CERTBOT_EMAIL set and DNS pointed:
#   docker compose --env-file .env.production --profile proxy --profile ssl up -d --build
#   Then issue cert once (see docs/POSTGRES_PRODUCTION.md)

x-app-logging: &app-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    logging: *app-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recruiter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-recruiter_copilot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    logging: *app-logging
    depends_on:
      postgres:
        condition: service_healthy
    # Publish only when not using nginx profile; with proxy, traffic goes via nginx.
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      PERSISTENCE_DRIVER: prisma
      DATABASE_URL: postgresql://${POSTGRES_USER:-recruiter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recruiter_copilot}?schema=public
      STORAGE_PATH: /app/data/resumes
      TELEMETRY_PATH: /app/data/telemetry/events.jsonl
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-ws_default}
      FEATURE_FLAGS_FILE: feature-flags/sprint-1.yaml
      LOG_FORMAT: json
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-10485760}
      OPERATIONS_DASHBOARD_ENABLED: ${OPERATIONS_DASHBOARD_ENABLED:-false}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    volumes:
      - api-resumes:/app/data/resumes
      - api-telemetry:/app/data/telemetry
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/health | grep -q '\"status\":\"ok\"' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  nginx:
    profiles: ["proxy", "ssl"]
    image: nginx:1.27-alpine
    restart: always
    logging: *app-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.http-only.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    # After certificates exist, switch mount to nginx.conf (TLS) — see docs.

  certbot:
    profiles: ["ssl"]
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  postgres-data:
  api-resumes:
  api-telemetry:
  certbot-www:
  certbot-certs:
